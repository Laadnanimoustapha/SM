<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" width="200" height="180">
  <!-- EW Jammer Station — Electronic Warfare (Non-Kinetic) -->
  <defs>
    <linearGradient id="ewBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d2050"/>
      <stop offset="50%" stop-color="#4a3878"/>
      <stop offset="100%" stop-color="#2d2050"/>
    </linearGradient>
  </defs>
  <!-- Platform base -->
  <rect x="50" y="140" width="100" height="20" rx="3" fill="#2d2050"/>
  <!-- Support structure -->
  <rect x="90" y="80" width="20" height="65" rx="2" fill="#4a3878"/>
  <!-- Antenna mast -->
  <rect x="97" y="25" width="6" height="60" fill="#4a3878" stroke="#a29bfe" stroke-width="0.5"/>
  <!-- Cross antenna -->
  <rect x="70" y="22" width="60" height="6" rx="2" fill="#6c5ce7" stroke="#a29bfe" stroke-width="0.5"/>
  <!-- Antenna elements -->
  <circle cx="75" cy="25" r="3" fill="#a29bfe" opacity="0.4"/>
  <circle cx="125" cy="25" r="3" fill="#a29bfe" opacity="0.4"/>
  <circle cx="100" cy="25" r="3" fill="#a29bfe" opacity="0.4"/>
  <!-- Jamming radiation arcs -->
  <path d="M100 10 A 20 20 0 0 1 118 18" fill="none" stroke="#a29bfe" stroke-width="1.2" opacity="0.6"/>
  <path d="M100 5 A 28 28 0 0 1 125 15" fill="none" stroke="#a29bfe" stroke-width="0.9" opacity="0.4"/>
  <path d="M100 0 A 36 36 0 0 1 132 12" fill="none" stroke="#a29bfe" stroke-width="0.6" opacity="0.25"/>
  <path d="M100 10 A 20 20 0 0 0 82 18" fill="none" stroke="#a29bfe" stroke-width="1.2" opacity="0.6"/>
  <path d="M100 5 A 28 28 0 0 0 75 15" fill="none" stroke="#a29bfe" stroke-width="0.9" opacity="0.4"/>
  <path d="M100 0 A 36 36 0 0 0 68 12" fill="none" stroke="#a29bfe" stroke-width="0.6" opacity="0.25"/>
  <!-- Equipment housing -->
  <rect x="65" y="110" width="70" height="32" rx="4" fill="url(#ewBody)" stroke="#6c5ce7" stroke-width="0.5"/>
  <!-- Display screens -->
  <rect x="72" y="115" width="14" height="10" rx="1" fill="#1a0a35" stroke="#a29bfe" stroke-width="0.3"/>
  <rect x="92" y="115" width="14" height="10" rx="1" fill="#1a0a35" stroke="#a29bfe" stroke-width="0.3"/>
  <rect x="112" y="115" width="14" height="10" rx="1" fill="#1a0a35" stroke="#a29bfe" stroke-width="0.3"/>
  <!-- Interference circles (jam zone) -->
  <circle cx="100" cy="90" r="60" fill="none" stroke="#a29bfe" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.15"/>
  <circle cx="100" cy="90" r="40" fill="none" stroke="#a29bfe" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.1"/>
  <!-- Label -->
  <text x="100" y="175" text-anchor="middle" font-family="monospace" font-size="7" fill="#a29bfe" font-weight="bold">EW JAMMER</text>
</svg>
