<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 140" width="300" height="140">
  <!-- F-14AM Tomcat — Fighter Interceptor Squadron -->
  <defs>
    <linearGradient id="f14Body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a1f6b"/>
      <stop offset="50%" stop-color="#5f27cd"/>
      <stop offset="100%" stop-color="#3a1f6b"/>
    </linearGradient>
    <radialGradient id="afterburner" cx="100%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="30%" stop-color="#fbbf24"/>
      <stop offset="60%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#5f27cd" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Afterburner plumes (twin engines) -->
  <ellipse cx="8" cy="62" rx="15" ry="6" fill="url(#afterburner)" opacity="0.8"/>
  <ellipse cx="8" cy="78" rx="15" ry="6" fill="url(#afterburner)" opacity="0.8"/>
  <!-- Fuselage -->
  <rect x="30" y="55" width="200" height="30" rx="15" fill="url(#f14Body)"/>
  <!-- Variable-sweep wings (spread position) -->
  <polygon points="90,55 45,15 55,12 120,55" fill="#4a1f8b" stroke="#5f27cd" stroke-width="0.5"/>
  <polygon points="90,85 45,125 55,128 120,85" fill="#4a1f8b" stroke="#5f27cd" stroke-width="0.5"/>
  <!-- Wing glove -->
  <polygon points="90,55 85,48 105,48 105,55" fill="#5f27cd" opacity="0.6"/>
  <polygon points="90,85 85,92 105,92 105,85" fill="#5f27cd" opacity="0.6"/>
  <!-- Twin vertical stabilizers -->
  <polygon points="45,55 35,30 50,30 55,55" fill="#3a1f6b" stroke="#5f27cd" stroke-width="0.5"/>
  <polygon points="55,55 45,32 60,32 62,55" fill="#3a1f6b" stroke="#5f27cd" stroke-width="0.5"/>
  <!-- Horizontal stabilizers -->
  <polygon points="38,55 28,45 40,45" fill="#3a1f6b"/>
  <polygon points="38,85 28,95 40,95" fill="#3a1f6b"/>
  <!-- Cockpit canopy -->
  <path d="M200 65 Q215 60 225 65 Q225 75 215 80 Q200 80 200 70Z" fill="#1a0a35" stroke="#8b5cf6" stroke-width="0.5"/>
  <path d="M202 66 Q212 62 220 66" fill="none" stroke="#a78bfa" stroke-width="0.3" opacity="0.5"/>
  <!-- Nosecone (AWG-9 radar) -->
  <path d="M230 70 Q242 65 250 70 Q242 75 230 70Z" fill="#7c3aed"/>
  <!-- AIM-54 Phoenix missiles (under fuselage) -->
  <rect x="100" y="86" width="40" height="4" rx="2" fill="#6366f1" opacity="0.5"/>
  <rect x="120" y="86" width="40" height="4" rx="2" fill="#6366f1" opacity="0.5"/>
  <!-- Roundel (Iranian Air Force) -->
  <circle cx="160" cy="70" r="5" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
  <!-- Label -->
  <text x="150" y="8" text-anchor="middle" font-family="monospace" font-size="8" fill="#5f27cd" font-weight="bold">F-14AM TOMCAT</text>
  <text x="150" y="138" text-anchor="middle" font-family="monospace" font-size="5" fill="#a78bfa" opacity="0.6">Fighter Interceptor · AIM-54 Phoenix · AWG-9</text>
</svg>
