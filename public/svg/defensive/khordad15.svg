<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 170" width="250" height="170">
  <!-- Khordad-15 — Stealth-Hunter MR-SAM -->
  <defs>
    <linearGradient id="truckGradKH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a3d2d"/>
      <stop offset="50%" stop-color="#1a6b4a"/>
      <stop offset="100%" stop-color="#0a3d2d"/>
    </linearGradient>
  </defs>
  <!-- Truck chassis -->
  <rect x="25" y="125" width="200" height="25" rx="3" fill="#0a3d2d"/>
  <!-- Wheels -->
  <circle cx="55" cy="155" r="9" fill="#111" stroke="#333" stroke-width="1.5"/>
  <circle cx="80" cy="155" r="9" fill="#111" stroke="#333" stroke-width="1.5"/>
  <circle cx="170" cy="155" r="9" fill="#111" stroke="#333" stroke-width="1.5"/>
  <circle cx="195" cy="155" r="9" fill="#111" stroke="#333" stroke-width="1.5"/>
  <!-- Cab -->
  <rect x="25" y="108" width="40" height="20" rx="3" fill="#0a3d2d"/>
  <rect x="30" y="112" width="15" height="10" rx="1" fill="#062e1f" opacity="0.5"/>
  <!-- Missile tubes (6x, erected) -->
  <g transform="rotate(-50, 140, 125)">
    <rect x="85" y="70" width="14" height="85" rx="7" fill="#1a6b4a" stroke="#00b894" stroke-width="0.5"/>
    <rect x="105" y="70" width="14" height="85" rx="7" fill="#1a6b4a" stroke="#00b894" stroke-width="0.5"/>
    <rect x="125" y="70" width="14" height="85" rx="7" fill="#1a6b4a" stroke="#00b894" stroke-width="0.5"/>
    <rect x="145" y="70" width="14" height="85" rx="7" fill="#1a6b4a" stroke="#00b894" stroke-width="0.5"/>
    <rect x="165" y="70" width="14" height="85" rx="7" fill="#1a6b4a" stroke="#00b894" stroke-width="0.5"/>
    <rect x="185" y="70" width="14" height="85" rx="7" fill="#1a6b4a" stroke="#00b894" stroke-width="0.5"/>
  </g>
  <!-- Stealth detection radar (enhanced AESA) -->
  <rect x="225" y="100" width="3" height="28" fill="#0a3d2d"/>
  <rect x="215" y="92" width="22" height="12" rx="2" fill="#062e1f" stroke="#00b894" stroke-width="1"/>
  <!-- Stealth scan pulses -->
  <path d="M226 85 A 15 15 0 0 1 240 94" fill="none" stroke="#00b894" stroke-width="0.8" opacity="0.5" stroke-dasharray="2,2"/>
  <path d="M226 82 A 20 20 0 0 1 245 94" fill="none" stroke="#00b894" stroke-width="0.5" opacity="0.3" stroke-dasharray="2,2"/>
  <!-- Label -->
  <text x="130" y="12" text-anchor="middle" font-family="monospace" font-size="8" fill="#00b894" font-weight="bold">KHORDAD-15</text>
  <text x="130" y="24" text-anchor="middle" font-family="monospace" font-size="5" fill="#6ee7b7" opacity="0.6">3rd Khordad MR-SAM · Stealth-Hunter</text>
</svg>
