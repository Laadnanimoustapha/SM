<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" width="240" height="160">
  <!-- Tor-M1 (SA-15 Gauntlet) — Short-Range SAM -->
  <defs>
    <linearGradient id="hullGradT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a4028"/>
      <stop offset="50%" stop-color="#3d6030"/>
      <stop offset="100%" stop-color="#2a4028"/>
    </linearGradient>
  </defs>
  <!-- Tracked chassis -->
  <rect x="30" y="110" width="180" height="30" rx="5" fill="#1a1a1a"/>
  <!-- Track links -->
  <rect x="28" y="108" width="184" height="34" rx="8" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Road wheels -->
  <circle cx="60" cy="127" r="8" fill="#222" stroke="#444" stroke-width="1"/>
  <circle cx="90" cy="127" r="8" fill="#222" stroke="#444" stroke-width="1"/>
  <circle cx="120" cy="127" r="8" fill="#222" stroke="#444" stroke-width="1"/>
  <circle cx="150" cy="127" r="8" fill="#222" stroke="#444" stroke-width="1"/>
  <circle cx="180" cy="127" r="8" fill="#222" stroke="#444" stroke-width="1"/>
  <!-- Hull -->
  <rect x="40" y="75" width="160" height="38" rx="4" fill="url(#hullGradT)"/>
  <!-- Rotating turret with 8 missile tubes -->
  <rect x="70" y="50" width="100" height="28" rx="5" fill="#3d6030" stroke="#2a4028" stroke-width="1"/>
  <!-- Missile tube openings (2x4 grid) -->
  <circle cx="90" cy="58" r="5" fill="#1a2e15" stroke="#4a7a38" stroke-width="0.5"/>
  <circle cx="105" cy="58" r="5" fill="#1a2e15" stroke="#4a7a38" stroke-width="0.5"/>
  <circle cx="135" cy="58" r="5" fill="#1a2e15" stroke="#4a7a38" stroke-width="0.5"/>
  <circle cx="150" cy="58" r="5" fill="#1a2e15" stroke="#4a7a38" stroke-width="0.5"/>
  <circle cx="90" cy="72" r="5" fill="#1a2e15" stroke="#4a7a38" stroke-width="0.5"/>
  <circle cx="105" cy="72" r="5" fill="#1a2e15" stroke="#4a7a38" stroke-width="0.5"/>
  <circle cx="135" cy="72" r="5" fill="#1a2e15" stroke="#4a7a38" stroke-width="0.5"/>
  <circle cx="150" cy="72" r="5" fill="#1a2e15" stroke="#4a7a38" stroke-width="0.5"/>
  <!-- Radar (top of turret) -->
  <rect x="115" y="42" width="10" height="10" rx="2" fill="#2a4028" stroke="#00d2d3" stroke-width="0.8"/>
  <circle cx="120" cy="47" r="3" fill="none" stroke="#00d2d3" stroke-width="0.5"/>
  <!-- Label -->
  <text x="120" y="15" text-anchor="middle" font-family="monospace" font-size="8" fill="#00d2d3" font-weight="bold">TOR-M1</text>
  <text x="120" y="27" text-anchor="middle" font-family="monospace" font-size="5" fill="#67e8f9" opacity="0.6">SA-15 Gauntlet · 12km Range</text>
</svg>
