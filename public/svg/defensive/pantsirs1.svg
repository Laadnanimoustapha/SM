<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 170" width="280" height="170">
  <!-- Pantsir-S1 (SA-22 Greyhound) — SHORAD Gun/Missile Combo -->
  <defs>
    <linearGradient id="hullGradPS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2040"/>
      <stop offset="50%" stop-color="#3d3060"/>
      <stop offset="100%" stop-color="#2a2040"/>
    </linearGradient>
  </defs>
  <!-- Wheeled truck chassis -->
  <rect x="30" y="125" width="220" height="25" rx="3" fill="#1a1628"/>
  <!-- Wheels -->
  <circle cx="60" cy="155" r="9" fill="#111" stroke="#333" stroke-width="1.5"/>
  <circle cx="88" cy="155" r="9" fill="#111" stroke="#333" stroke-width="1.5"/>
  <circle cx="192" cy="155" r="9" fill="#111" stroke="#333" stroke-width="1.5"/>
  <circle cx="220" cy="155" r="9" fill="#111" stroke="#333" stroke-width="1.5"/>
  <!-- Cab -->
  <rect x="30" y="108" width="42" height="20" rx="3" fill="#2a2040"/>
  <rect x="35" y="112" width="16" height="10" rx="1" fill="#1a1628" opacity="0.5"/>
  <!-- Turret base -->
  <rect x="80" y="85" width="120" height="42" rx="4" fill="url(#hullGradPS)"/>
  <!-- Twin 30mm autocannons -->
  <rect x="200" y="88" width="60" height="4" rx="2" fill="#4a3878" stroke="#6c5ce7" stroke-width="0.5"/>
  <rect x="200" y="100" width="60" height="4" rx="2" fill="#4a3878" stroke="#6c5ce7" stroke-width="0.5"/>
  <!-- Muzzle brakes -->
  <rect x="258" y="87" width="6" height="6" rx="1" fill="#3d3060"/>
  <rect x="258" y="99" width="6" height="6" rx="1" fill="#3d3060"/>
  <!-- Missile tubes (6 per side) -->
  <g>
    <rect x="90" y="68" width="10" height="20" rx="3" fill="#3d3060" stroke="#6c5ce7" stroke-width="0.3"/>
    <rect x="104" y="68" width="10" height="20" rx="3" fill="#3d3060" stroke="#6c5ce7" stroke-width="0.3"/>
    <rect x="118" y="68" width="10" height="20" rx="3" fill="#3d3060" stroke="#6c5ce7" stroke-width="0.3"/>
    <rect x="140" y="68" width="10" height="20" rx="3" fill="#3d3060" stroke="#6c5ce7" stroke-width="0.3"/>
    <rect x="154" y="68" width="10" height="20" rx="3" fill="#3d3060" stroke="#6c5ce7" stroke-width="0.3"/>
    <rect x="168" y="68" width="10" height="20" rx="3" fill="#3d3060" stroke="#6c5ce7" stroke-width="0.3"/>
  </g>
  <!-- Tracking radar (center) -->
  <rect x="128" y="56" width="24" height="14" rx="2" fill="#1a1628" stroke="#6c5ce7" stroke-width="0.8"/>
  <circle cx="140" cy="63" r="4" fill="none" stroke="#6c5ce7" stroke-width="0.5"/>
  <circle cx="140" cy="63" r="1.5" fill="#6c5ce7" opacity="0.4"/>
  <!-- Label -->
  <text x="140" y="12" text-anchor="middle" font-family="monospace" font-size="8" fill="#6c5ce7" font-weight="bold">PANTSIR-S1</text>
  <text x="140" y="24" text-anchor="middle" font-family="monospace" font-size="5" fill="#a78bfa" opacity="0.6">SA-22 Greyhound · Gun+Missile SHORAD</text>
</svg>
