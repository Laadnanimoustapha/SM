<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 500" width="150" height="500">
  <!-- Khorramshahr-4 — Heavy IRBM (1500kg warhead) -->
  <defs>
    <linearGradient id="bodyGradK" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a202c"/>
      <stop offset="25%" stop-color="#2d3748"/>
      <stop offset="75%" stop-color="#2d3748"/>
      <stop offset="100%" stop-color="#1a202c"/>
    </linearGradient>
    <linearGradient id="rvGradK" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="50%" stop-color="#b91c1c"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <radialGradient id="flameGradK" cx="50%" cy="0%" r="85%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="15%" stop-color="#fef08a"/>
      <stop offset="45%" stop-color="#f97316"/>
      <stop offset="75%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Massive exhaust -->
  <ellipse cx="75" cy="480" rx="22" ry="35" fill="url(#flameGradK)" opacity="0.9"/>
  <ellipse cx="75" cy="474" rx="12" ry="20" fill="#fefce8" opacity="0.8"/>
  <!-- Heavy fins -->
  <polygon points="45,420 18,460 45,450" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <polygon points="105,420 132,460 105,450" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <polygon points="65,420 62,465 75,450" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <polygon points="85,420 88,465 75,450" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <!-- Massive booster -->
  <rect x="48" y="280" width="54" height="175" rx="5" fill="url(#bodyGradK)"/>
  <!-- Interstage -->
  <rect x="44" y="270" width="62" height="14" rx="3" fill="#374151"/>
  <!-- Second stage -->
  <rect x="50" y="120" width="50" height="154" rx="5" fill="url(#bodyGradK)"/>
  <!-- Heavy RV -->
  <path d="M75 10 Q45 70 48 100 L102 100 Q105 70 75 10Z" fill="url(#rvGradK)"/>
  <!-- RV separation -->
  <line x1="48" y1="120" x2="102" y2="120" stroke="#991b1b" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- MIRV capability marking (3 circles) -->
  <circle cx="65" cy="55" r="4" fill="none" stroke="#fca5a5" stroke-width="0.8" opacity="0.5"/>
  <circle cx="75" cy="48" r="4" fill="none" stroke="#fca5a5" stroke-width="0.8" opacity="0.5"/>
  <circle cx="85" cy="55" r="4" fill="none" stroke="#fca5a5" stroke-width="0.8" opacity="0.5"/>
  <!-- Markings -->
  <text x="75" y="220" text-anchor="middle" font-family="monospace" font-size="8" fill="#a0aec0" opacity="0.6">خرمشهر-۴</text>
  <text x="75" y="238" text-anchor="middle" font-family="monospace" font-size="6" fill="#a0aec0" opacity="0.4">IRBM · 1500kg W/H</text>
</svg>
