<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 90" width="280" height="90">
  <!-- Paveh ALCM — Air-Launched Cruise Missile (sea-skimming) -->
  <defs>
    <linearGradient id="bodyGradP" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b7280"/>
      <stop offset="50%" stop-color="#9ca3af"/>
      <stop offset="100%" stop-color="#6b7280"/>
    </linearGradient>
    <radialGradient id="jetGradP" cx="100%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="40%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#9a3412" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Jet exhaust -->
  <ellipse cx="10" cy="45" rx="15" ry="7" fill="url(#jetGradP)" opacity="0.85"/>
  <!-- Fuselage (sleeker than Soumar) -->
  <rect x="25" y="35" width="210" height="20" rx="10" fill="url(#bodyGradP)"/>
  <!-- Wings (more swept, sea-skimmer profile) -->
  <polygon points="105,35 78,8 88,8 120,35" fill="#4b5563" stroke="#6b7280" stroke-width="0.5"/>
  <polygon points="105,55 78,82 88,82 120,55" fill="#4b5563" stroke="#6b7280" stroke-width="0.5"/>
  <!-- Canard foreplanes -->
  <polygon points="200,35 210,24 215,24 205,35" fill="#4b5563"/>
  <polygon points="200,55 210,66 215,66 205,55" fill="#4b5563"/>
  <!-- Tail -->
  <polygon points="30,35 20,20 32,28" fill="#374151"/>
  <polygon points="30,55 20,70 32,62" fill="#374151"/>
  <!-- Nose seeker -->
  <path d="M235 45 Q252 38 260 45 Q252 52 235 45Z" fill="#be185d"/>
  <ellipse cx="254" cy="45" rx="2.5" ry="3" fill="#1f2937" stroke="#be185d" stroke-width="0.5"/>
  <!-- Pink accent stripe -->
  <rect x="180" y="42" width="55" height="2" rx="1" fill="#ec4899" opacity="0.3"/>
  <!-- Markings -->
  <text x="140" y="49" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#e5e7eb" opacity="0.5">پاوه</text>
  <text x="140" y="33" text-anchor="middle" font-family="monospace" font-size="4" fill="#9ca3af" opacity="0.4">ALCM · Sea-Skimmer</text>
</svg>
