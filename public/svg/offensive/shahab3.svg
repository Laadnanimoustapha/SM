<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 440" width="120" height="440">
  <!-- Shahab-3 / Ghadr — Medium Range Ballistic Missile -->
  <defs>
    <linearGradient id="bodyGrad3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3c4f65"/>
      <stop offset="30%" stop-color="#5a7a96"/>
      <stop offset="70%" stop-color="#5a7a96"/>
      <stop offset="100%" stop-color="#3c4f65"/>
    </linearGradient>
    <linearGradient id="noseGrad3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c53030"/>
      <stop offset="50%" stop-color="#e53e3e"/>
      <stop offset="100%" stop-color="#c53030"/>
    </linearGradient>
    <radialGradient id="flameGrad3" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="25%" stop-color="#fde68a"/>
      <stop offset="55%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b91c1c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Exhaust flame -->
  <ellipse cx="60" cy="420" rx="16" ry="30" fill="url(#flameGrad3)" opacity="0.9"/>
  <ellipse cx="60" cy="415" rx="9" ry="18" fill="#fef3c7" opacity="0.85"/>
  <!-- Fins -->
  <polygon points="35,370 15,405 35,398" fill="#1a2332" stroke="#3c4f65" stroke-width="0.5"/>
  <polygon points="85,370 105,405 85,398" fill="#1a2332" stroke="#3c4f65" stroke-width="0.5"/>
  <polygon points="53,370 50,410 60,398" fill="#1a2332" stroke="#3c4f65" stroke-width="0.5"/>
  <polygon points="67,370 70,410 60,398" fill="#1a2332" stroke="#3c4f65" stroke-width="0.5"/>
  <!-- Booster stage -->
  <rect x="38" y="250" width="44" height="145" rx="4" fill="#2d3748"/>
  <rect x="40" y="255" width="40" height="135" rx="3" fill="url(#bodyGrad3)"/>
  <!-- Stage separator ring -->
  <rect x="36" y="245" width="48" height="8" rx="2" fill="#4a5568"/>
  <!-- Upper stage -->
  <rect x="40" y="90" width="40" height="158" rx="4" fill="url(#bodyGrad3)"/>
  <!-- Warhead section (separable RV) -->
  <path d="M60 12 Q38 65 40 90 L80 90 Q82 65 60 12Z" fill="url(#noseGrad3)"/>
  <!-- RV separation seam -->
  <line x1="40" y1="90" x2="80" y2="90" stroke="#9b2c2c" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Panel lines -->
  <line x1="38" y1="160" x2="82" y2="160" stroke="#2d3748" stroke-width="0.5" opacity="0.4"/>
  <line x1="38" y1="310" x2="82" y2="310" stroke="#2d3748" stroke-width="0.5" opacity="0.4"/>
  <!-- Markings -->
  <text x="60" y="200" text-anchor="middle" font-family="monospace" font-size="7" fill="#a0aec0" opacity="0.6">شهاب-۳</text>
  <text x="60" y="215" text-anchor="middle" font-family="monospace" font-size="5" fill="#a0aec0" opacity="0.4">MRBM</text>
</svg>
